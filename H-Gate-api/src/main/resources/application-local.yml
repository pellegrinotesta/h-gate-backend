logging:
  level:
    com.teoresi.argo: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/h_gate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: h_gate_user
    password: h_gate_pass
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

application:
  cors:
    allowedOrigins: 'http://localhost:4200'
